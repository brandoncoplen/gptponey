<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Polymarket Trades</title>
    <script>
        async function fetchMarkets() {
            try {
                const response = await fetch('https://clob.polymarket.com/markets');
                const data = await response.json();
                const marketSelect = document.getElementById('market');
                data.forEach(market => {
                    const option = document.createElement('option');
                    option.value = market.id;
                    option.textContent = market.name;
                    marketSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error fetching markets:', error);
            }
        }

        async function fetchTrades() {
            const marketId = document.getElementById('market').value;
            const priceThreshold = parseFloat(document.getElementById('price').value);
            const tradesContainer = document.getElementById('trades');
            tradesContainer.innerHTML = 'Loading...';

            try {
                const response = await fetch(`https://clob.polymarket.com/trades?marketId=${marketId}`);
                const trades = await response.json();

                const filteredTrades = trades
                    .filter(trade => trade.price > priceThreshold)
                    .slice(0, 10);

                tradesContainer.innerHTML = '';
                filteredTrades.forEach(trade => {
                    const tradeElement = document.createElement('div');
                    tradeElement.textContent = `Price: $${trade.price}, Quantity: ${trade.quantity}, Timestamp: ${new Date(trade.timestamp).toLocaleString()}`;
                    tradesContainer.appendChild(tradeElement);
                });

                if (filteredTrades.length === 0) {
                    tradesContainer.textContent = 'No trades found above the given price.';
                }
            } catch (error) {
                console.error('Error fetching trades:', error);
                tradesContainer.textContent = 'Failed to fetch trades.';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchMarkets();

            const updateButton = document.getElementById('update-button');
            updateButton.addEventListener('click', fetchTrades);
        });
    </script>
</head>
<body>
    <h1>Live Polymarket Trades</h1>
    <label for="market">Select Market:</label>
    <select id="market">
        <option value="">Loading markets...</option>
    </select>
    <br>
    <label for="price">Enter Price Threshold ($):</label>
    <input type="number" id="price" step="0.01">
    <br>
    <button id="update-button">Update</button>
    <h2>Recent Trades:</h2>
    <div id="trades">No trades to display.</div>
</body>
</html>
